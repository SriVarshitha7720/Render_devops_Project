<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h1 class="logo">⚡ MyWebApp</h1>
        <ul>
            <li class="active">🏠 Overview</li>
            <li>📊 Analytics</li>
            <li>👥 Users</li>
            <li>⚙️ Settings</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">

        <!-- Header -->
        <header class="topbar">
            <h2>Dashboard Overview</h2>
            <div class="profile">Varshitha 👩‍💻</div>
        </header>

        <!-- Stats -->
        <section class="cards">
            <div class="card">
                <h4>Status</h4>
                <p id="status" class="badge offline">Offline</p>
            </div>

            <div class="card">
                <h4>Total Users</h4>
                <p class="highlight">1,250</p>
            </div>

            <div class="card">
                <h4>Server Load</h4>
                <p class="highlight">12%</p>
            </div>
        </section>

        <!-- Action -->
        <section class="panel">
            <h3>Control Panel</h3>
            <button id="action-btn">🚀 Initialize System</button>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
